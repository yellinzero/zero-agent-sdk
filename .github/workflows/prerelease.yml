name: Prerelease (Beta)

on:
  pull_request:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  prerelease:
    name: Publish Beta
    if: github.event.label.name == '🚀 autorelease'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Refresh lockfile from git object
        run: git show HEAD:pnpm-lock.yaml > pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Set beta version
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          BETA_VERSION="${VERSION}-beta.${SHA}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${BETA_VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing version: ${BETA_VERSION}"

      - name: Publish beta to NPM
        run: pnpm pub:beta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
